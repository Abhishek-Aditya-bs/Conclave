name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build + Test + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Verify Java version
        run: java -version

      - name: mvn verify (unit + integration + coverage)
        # Failsafe spins up Testcontainers; runner has Docker pre-installed.
        run: mvn -B -ntp verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: '**/target/site/jacoco-merged/'
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Surefire / Failsafe reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 14
