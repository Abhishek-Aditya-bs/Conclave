// CONCLAVE — M5 Deliberation Orchestrator gRPC contract.
//
// One RPC: Deliberate. Caller hands over a JSON-serialized enriched event
// (M2 output for the relevant domain), plus the orchestration-critical IDs
// the graph already extracted. The judge agent sees the full event payload
// in its prompt; the structural IDs are pulled out so we don't reparse JSON
// in the orchestration code.
//
// The Decision shape matches spec §6 M5 exactly.
syntax = "proto3";

package io.conclave.deliberation.v1;

option java_package = "io.conclave.deliberation.proto";
option java_multiple_files = true;
option java_outer_classname = "DeliberationProto";

service DeliberationService {
  // Single round-trip. p99 < 600ms target applies to the Anthropic backend.
  // Ollama latency is hardware-dependent and excluded from the SLA.
  rpc Deliberate(DeliberationRequest) returns (DeliberationResponse);
}

message DeliberationRequest {
  // Stable event identifier — propagates through logs / decision audit.
  string event_id = 1;
  // "fraud" | "security" — chooses graph templates + textualization style.
  string domain = 2;
  // Identifier the M3 behavioral baseline service is keyed on.
  // From EnrichedPaymentEvent.baselineEntityId / EnrichedAuthEvent.baselineEntityId.
  string baseline_entity_id = 3;
  // Distinct node identifiers from this event the M4 graph reasoner may need.
  // From EnrichedPaymentEvent.graphEntityIds / EnrichedAuthEvent.graphEntityIds.
  repeated string graph_entity_ids = 4;
  // Canonical event payload as JSON. M5 does NOT re-decode Avro; M6 is
  // expected to encode the EnrichedPaymentEvent / EnrichedAuthEvent into JSON
  // before calling. The judge prompt embeds this verbatim.
  string enriched_event_json = 5;
}

message DeliberationResponse {
  Decision decision = 1;
}

message Decision {
  // Calibrated risk score in [0, 1].
  double score = 1;
  // Bucketed verdict label — "ALLOW" | "REVIEW" | "BLOCK".
  // Downstream consumers (step-up auth, SOC triage) read this as the headline.
  string verdict_label = 2;
  // Markdown-formatted human-readable explanation. Targets a SOC analyst /
  // fraud reviewer reading the audit UI in M7. Multi-paragraph allowed.
  string verdict_explanation_md = 3;
  // Per-factor breakdown. Order is judge-determined (most influential first).
  repeated ContributingFactor contributing_factors = 4;
  // End-to-end wall-clock latency of the LangGraph traversal, in ms.
  // Excludes gRPC envelope cost on the caller side.
  int64 latency_ms = 5;
  // Which provider produced this decision — "anthropic" | "ollama".
  // Surface this in the audit UI; benchmark numbers only ever quote
  // anthropic-backed runs (spec §5 caveat).
  string judge_provider = 6;
  // Model identifier used by that provider (e.g. "claude-haiku-4-5-20251001",
  // "qwen3:8b"). Free-form string — provider-defined naming.
  string judge_model = 7;
}

message ContributingFactor {
  // Short identifier — "behavioral_anomaly", "graph_ring_detected", etc.
  // Judge picks from a stable vocabulary the prompt describes.
  string name = 1;
  // Signed weight in [-1, 1]. Positive = drives toward BLOCK,
  // negative = drives toward ALLOW. Zero = mentioned for context but neutral.
  double weight = 2;
  // One-sentence evidence excerpt the judge can quote into the explanation.
  string evidence = 3;
}
