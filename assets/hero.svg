<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">
  <defs>
    <marker id="t" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#37d6c2"/></marker>
    <marker id="v" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#8b7bff"/></marker>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#ffb84d"/></marker>
    <marker id="n" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#71717a"/></marker>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0 H0 V34" fill="none" stroke="#161616" stroke-width="1"/></pattern>
  </defs>

  <rect width="1280" height="300" fill="#0a0a0a"/>
  <rect width="1280" height="300" fill="url(#grid)"/>
  <rect y="0" width="1280" height="1.5" fill="#27272a"/>

  <text x="64" y="88" fill="#fafafa" font-size="52" font-weight="700" letter-spacing="8">CONCLAVE</text>
  <text x="66" y="120" fill="#a1a1aa" font-size="15.5">Multi-agent real-time risk detection &#8212; one architecture, two domains</text>

  <g transform="translate(0,38)">
    <!-- colored arrows -->
    <path d="M196 172 H230"                      fill="none" stroke="#71717a" stroke-width="2" marker-end="url(#n)"/>
    <path d="M360 172 C386 172 384 138 406 138"  fill="none" stroke="#37d6c2" stroke-width="2" marker-end="url(#t)"/>
    <path d="M360 172 C386 172 384 206 406 206"  fill="none" stroke="#8b7bff" stroke-width="2" marker-end="url(#v)"/>
    <path d="M612 138 C636 138 636 172 654 172"  fill="none" stroke="#37d6c2" stroke-width="2" marker-end="url(#t)"/>
    <path d="M612 206 C636 206 636 172 654 172"  fill="none" stroke="#8b7bff" stroke-width="2" marker-end="url(#v)"/>
    <path d="M804 172 H838"                       fill="none" stroke="#ffb84d" stroke-width="2" marker-end="url(#a)"/>

    <!-- monochrome boxes -->
    <rect x="64"  y="148" width="132" height="48" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="130" y="170" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="600">event</text>
    <text x="130" y="186" text-anchor="middle" fill="#71717a" font-size="10.5">on the stream</text>

    <rect x="232" y="148" width="128" height="48" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
    <text x="296" y="170" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="600">feature</text>
    <text x="296" y="186" text-anchor="middle" fill="#71717a" font-size="10.5">distill</text>

    <rect x="406" y="114" width="206" height="48" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
    <rect x="416" y="130" width="6" height="16" rx="2" fill="#37d6c2"/>
    <text x="513" y="136" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="600">behavioral baseliner</text>
    <text x="513" y="152" text-anchor="middle" fill="#71717a" font-size="10.5">cosine vs. rolling profile</text>

    <rect x="406" y="182" width="206" height="48" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
    <rect x="416" y="198" width="6" height="16" rx="2" fill="#8b7bff"/>
    <text x="513" y="204" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="600">graph reasoner</text>
    <text x="513" y="220" text-anchor="middle" fill="#71717a" font-size="10.5">rings &#183; lateral movement</text>

    <rect x="654" y="148" width="150" height="48" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
    <rect x="664" y="164" width="6" height="16" rx="2" fill="#ffb84d"/>
    <text x="732" y="170" text-anchor="middle" fill="#e4e4e7" font-size="13" font-weight="600">judge (LLM)</text>
    <text x="732" y="186" text-anchor="middle" fill="#71717a" font-size="10.5">deliberates</text>

    <rect x="838" y="148" width="378" height="48" rx="9" fill="#0e0e0e" stroke="#52525b" stroke-width="1.5"/>
    <text x="1027" y="170" text-anchor="middle" font-size="13.5" font-weight="700" letter-spacing="1">
      <tspan fill="#34d399">ALLOW</tspan><tspan fill="#52525b"> &#183; </tspan><tspan fill="#ffb84d">REVIEW</tspan><tspan fill="#52525b"> &#183; </tspan><tspan fill="#fb7185">BLOCK</tspan>
    </text>
    <text x="1027" y="186" text-anchor="middle" fill="#71717a" font-size="10.5">calibrated score + the &#8220;why&#8221;</text>
  </g>

  <text x="64" y="286" fill="#71717a" font-size="12.5">payment fraud &#183; security / SOC &#8212; same agents, swap the config</text>
