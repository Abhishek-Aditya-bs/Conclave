<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0d1426"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b7bff"/>
      <stop offset="0.5" stop-color="#37d6c2"/>
      <stop offset="1" stop-color="#ffb84d"/>
    </linearGradient>
    <linearGradient id="verdict" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#37d6c2"/>
      <stop offset="1" stop-color="#ffb84d"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8b97ad"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 H0 V32" fill="none" stroke="#16203a" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="300" fill="url(#bg)"/>
  <rect width="1280" height="300" fill="url(#grid)" opacity="0.5"/>
  <rect width="1280" height="3" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="64" y="88" fill="#e7ecf5" font-size="52" font-weight="700" letter-spacing="8">CONCLAVE</text>
  <text x="66" y="120" fill="#8b97ad" font-size="15.5">Multi-agent real-time risk detection &#8212; one architecture, two domains</text>

  <!-- deliberation pipeline -->
  <g transform="translate(0,38)">
    <!-- arrows (drawn under the boxes) -->
    <path d="M196 172 H232"                       fill="none" stroke="#8b97ad" stroke-width="1.8" marker-end="url(#arr)"/>
    <path d="M360 172 C388 172 384 138 408 138"   fill="none" stroke="#37d6c2" stroke-width="1.8" marker-end="url(#arr)"/>
    <path d="M360 172 C388 172 384 206 408 206"   fill="none" stroke="#8b7bff" stroke-width="1.8" marker-end="url(#arr)"/>
    <path d="M612 138 C636 138 636 172 656 172"   fill="none" stroke="#37d6c2" stroke-width="1.8" marker-end="url(#arr)"/>
    <path d="M612 206 C636 206 636 172 656 172"   fill="none" stroke="#8b7bff" stroke-width="1.8" marker-end="url(#arr)"/>
    <path d="M804 172 H840"                        fill="none" stroke="#ffb84d" stroke-width="1.8" marker-end="url(#arr)"/>

    <!-- event -->
    <rect x="64"  y="148" width="132" height="48" rx="10" fill="#0e1626" stroke="#2a3650" stroke-width="1.5"/>
    <text x="130" y="170" text-anchor="middle" fill="#e7ecf5" font-size="13" font-weight="600">event</text>
    <text x="130" y="186" text-anchor="middle" fill="#8b97ad" font-size="10.5">on the stream</text>

    <!-- feature -->
    <rect x="232" y="148" width="128" height="48" rx="10" fill="#0e1626" stroke="#2a3650" stroke-width="1.5"/>
    <text x="296" y="170" text-anchor="middle" fill="#e7ecf5" font-size="13" font-weight="600">feature</text>
    <text x="296" y="186" text-anchor="middle" fill="#8b97ad" font-size="10.5">distill</text>

    <!-- baseliner (teal) -->
    <rect x="408" y="114" width="204" height="48" rx="10" fill="#0e1626" stroke="#37d6c2" stroke-width="1.5"/>
    <text x="510" y="136" text-anchor="middle" fill="#37d6c2" font-size="13" font-weight="600">behavioral baseliner</text>
    <text x="510" y="152" text-anchor="middle" fill="#8b97ad" font-size="10.5">cosine vs. rolling profile</text>

    <!-- graph (violet) -->
    <rect x="408" y="182" width="204" height="48" rx="10" fill="#0e1626" stroke="#8b7bff" stroke-width="1.5"/>
    <text x="510" y="204" text-anchor="middle" fill="#8b7bff" font-size="13" font-weight="600">graph reasoner</text>
    <text x="510" y="220" text-anchor="middle" fill="#8b97ad" font-size="10.5">rings &#183; lateral movement</text>

    <!-- judge (amber) -->
    <rect x="656" y="148" width="148" height="48" rx="10" fill="#0e1626" stroke="#ffb84d" stroke-width="1.5"/>
    <text x="730" y="170" text-anchor="middle" fill="#ffb84d" font-size="13" font-weight="600">judge (LLM)</text>
    <text x="730" y="186" text-anchor="middle" fill="#8b97ad" font-size="10.5">deliberates</text>

    <!-- verdict -->
    <rect x="840" y="148" width="376" height="48" rx="10" fill="#0f1830" stroke="url(#verdict)" stroke-width="1.5"/>
    <text x="1028" y="170" text-anchor="middle" fill="#e7ecf5" font-size="13.5" font-weight="700" letter-spacing="1.5">ALLOW &#183; REVIEW &#183; BLOCK</text>
    <text x="1028" y="186" text-anchor="middle" fill="#8b97ad" font-size="10.5">calibrated score + the &#8220;why&#8221;</text>
  </g>

  <text x="64" y="286" fill="#8b97ad" font-size="12.5">payment fraud &#183; security / SOC &#8212; same agents, swap the config</text>
</svg>
