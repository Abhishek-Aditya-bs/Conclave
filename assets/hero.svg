<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#10182a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.5" stop-color="#37d6c2"/>
      <stop offset="1" stop-color="#ffb84d"/>
    </linearGradient>
    <style>
      .t  { fill:#e7ecf5; }
      .m  { fill:#8b97ad; }
      .a  { fill:#7c5cff; }
      .g  { fill:#37d6c2; }
      .y  { fill:#ffb84d; }
      .box{ fill:#121a2b; stroke:#26324a; stroke-width:1.5; rx:10; }
      .lbl{ font-size:13px; }
    </style>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <text x="60" y="92" class="t" font-size="58" font-weight="700" letter-spacing="6">CONCLAVE</text>
  <text x="64" y="128" class="m" font-size="17">Multi-agent real-time risk detection &#183; one architecture, multiple domains</text>

  <!-- pipeline -->
  <g transform="translate(60,176)">
    <!-- event -->
    <rect class="box" x="0" y="0" width="132" height="64" rx="10"/>
    <text x="66" y="30" text-anchor="middle" class="t lbl" font-weight="600">event</text>
    <text x="66" y="49" text-anchor="middle" class="m" font-size="11">on the stream</text>

    <path d="M138 32 H188" stroke="#37d6c2" stroke-width="2" marker-end="url(#arr)"/>

    <!-- agents stack -->
    <rect class="box" x="196" y="-26" width="172" height="48" rx="10"/>
    <text x="282" y="4" text-anchor="middle" class="g lbl" font-weight="600">behavioral baseliner</text>
    <rect class="box" x="196" y="34" width="172" height="48" rx="10"/>
    <text x="282" y="64" text-anchor="middle" class="a lbl" font-weight="600">graph reasoner</text>

    <path d="M374 30 H424" stroke="#7c5cff" stroke-width="2" marker-end="url(#arr)"/>

    <!-- judge -->
    <rect class="box" x="432" y="0" width="150" height="64" rx="10"/>
    <text x="507" y="30" text-anchor="middle" class="y lbl" font-weight="600">judge (LLM)</text>
    <text x="507" y="49" text-anchor="middle" class="m" font-size="11">deliberates</text>

    <path d="M588 32 H640" stroke="#ffb84d" stroke-width="2" marker-end="url(#arr)"/>

    <!-- verdict -->
    <rect x="648" y="0" width="232" height="64" rx="10" fill="#0f1830" stroke="#3a2d6b" stroke-width="1.5"/>
    <text x="764" y="28" text-anchor="middle" class="t lbl" font-weight="700">ALLOW &#183; REVIEW &#183; BLOCK</text>
    <text x="764" y="49" text-anchor="middle" class="m" font-size="11">calibrated score + the &#8220;why&#8221;</text>
  </g>

  <text x="60" y="298" class="m" font-size="12.5">payment fraud  &#183;  security / SOC  &#8212;  same agents, swap the config</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8b97ad"/>
    </marker>
  </defs>
</svg>
