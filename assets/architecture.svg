<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="250" viewBox="0 0 1240 250" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace">
  <defs>
    <marker id="n" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#71717a"/></marker>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#ffb84d"/></marker>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0 H0 V34" fill="none" stroke="#161616" stroke-width="1"/></pattern>
  </defs>

  <rect width="1240" height="250" fill="#0a0a0a"/>
  <rect width="1240" height="250" fill="url(#grid)"/>

  <!-- flow arrows (labeled) -->
  <path d="M182 97 H248" fill="none" stroke="#71717a" stroke-width="2" marker-end="url(#n)"/>
  <text x="215" y="88" text-anchor="middle" fill="#52525b" font-size="9.5">events.{d}.raw</text>
  <path d="M452 97 H518" fill="none" stroke="#71717a" stroke-width="2" marker-end="url(#n)"/>
  <text x="485" y="88" text-anchor="middle" fill="#52525b" font-size="9.5">.enriched</text>
  <path d="M682 97 H748" fill="none" stroke="#37d6c2" stroke-width="2" marker-end="url(#n)"/>
  <text x="715" y="88" text-anchor="middle" fill="#52525b" font-size="9.5">gRPC</text>
  <path d="M1052 97 H1108" fill="none" stroke="#ffb84d" stroke-width="2" marker-end="url(#a)"/>
  <text x="1080" y="88" text-anchor="middle" fill="#52525b" font-size="9.5">decision</text>

  <!-- generators -->
  <rect x="32" y="70" width="150" height="54" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="107" y="93" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">generators</text>
  <text x="107" y="109" text-anchor="middle" fill="#71717a" font-size="10">labeled synthetic</text>

  <!-- feature extraction -->
  <rect x="248" y="70" width="204" height="54" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="350" y="93" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">feature extraction</text>
  <text x="350" y="109" text-anchor="middle" fill="#71717a" font-size="10">Kafka Streams &#183; enrich</text>

  <!-- orchestrator -->
  <rect x="518" y="70" width="164" height="54" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="600" y="93" text-anchor="middle" fill="#e4e4e7" font-size="12.5" font-weight="600">orchestrator</text>
  <text x="600" y="109" text-anchor="middle" fill="#71717a" font-size="10">Spring Boot</text>

  <!-- deliberation box w/ 3 agent chips -->
  <rect x="748" y="42" width="304" height="110" rx="10" fill="#0e0e0e" stroke="#52525b" stroke-width="1.5"/>
  <text x="900" y="60" text-anchor="middle" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="0.5">4-AGENT DELIBERATION &#183; LangGraph</text>
  <g font-size="11.5">
    <rect x="764" y="70" width="272" height="22" rx="6" fill="#161616" stroke="#3f3f46"/>
    <rect x="772" y="76" width="6" height="10" rx="2" fill="#37d6c2"/><text x="788" y="85" fill="#e4e4e7">behavioral baseliner</text>
    <rect x="764" y="96" width="272" height="22" rx="6" fill="#161616" stroke="#3f3f46"/>
    <rect x="772" y="102" width="6" height="10" rx="2" fill="#8b7bff"/><text x="788" y="111" fill="#e4e4e7">graph reasoner</text>
    <rect x="764" y="122" width="272" height="22" rx="6" fill="#161616" stroke="#3f3f46"/>
    <rect x="772" y="128" width="6" height="10" rx="2" fill="#ffb84d"/><text x="788" y="137" fill="#e4e4e7">deliberating judge (LLM)</text>
  </g>

  <!-- audit -->
  <rect x="1108" y="70" width="120" height="54" rx="9" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="1168" y="93" text-anchor="middle" fill="#e4e4e7" font-size="12" font-weight="600">Postgres</text>
  <text x="1168" y="109" text-anchor="middle" fill="#71717a" font-size="9.5">audit API + dashboard</text>

  <!-- stores under deliberation -->
  <path d="M838 144 V178" fill="none" stroke="#71717a" stroke-width="1.5"/>
  <path d="M962 144 V178" fill="none" stroke="#71717a" stroke-width="1.5"/>
  <rect x="772" y="180" width="132" height="34" rx="8" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="838" y="201" text-anchor="middle" fill="#a1a1aa" font-size="11">pgvector</text>
  <rect x="912" y="180" width="124" height="34" rx="8" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="974" y="201" text-anchor="middle" fill="#a1a1aa" font-size="11">Neo4j</text>

  <!-- decisions topic under orchestrator -->
  <path d="M600 124 V178" fill="none" stroke="#71717a" stroke-width="1.5" marker-end="url(#n)"/>
  <rect x="518" y="180" width="164" height="32" rx="8" fill="#161616" stroke="#3f3f46" stroke-width="1.5"/>
  <text x="600" y="200" text-anchor="middle" fill="#a1a1aa" font-size="10.5">decisions.{d} (Kafka)</text>

  <text x="32" y="238" fill="#52525b" font-size="11">d = fraud | security &#160;&#183;&#160; infra: Kafka &#183; Schema Registry &#183; Postgres (pgvector) &#183; Neo4j</text>
</svg>
