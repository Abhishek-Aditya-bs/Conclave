# CONCLAVE orchestrator — shared config.
#
# The active Spring profile picks the domain. Set either:
#   SPRING_PROFILES_ACTIVE=fraud
# or
#   SPRING_PROFILES_ACTIVE=security
#
# Defaults to fraud for local convenience; the demo Makefile switches via env var.

spring:
  application:
    name: conclave-orchestrator
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:fraud}
  # The audit API serializes records in snake_case to match the decisions
  # Kafka payload shape DecisionPublisher emits — keeps the dashboard's
  # type definitions uniform across REST and the live event stream.
  jackson:
    property-naming-strategy: SNAKE_CASE
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Properties that apply to producer, consumer, AND streams clients.
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:mock://conclave-default}
      auto.register.schemas: true
      specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        # Strong delivery defaults for risk-event streams — order matters.
        enable.idempotence: true
        acks: all
        max.in.flight.requests.per.connection: 5
    consumer:
      # The @KafkaListener consumes enriched events as Avro. The Confluent
      # deserializer + specific.avro.reader=true above means the listener
      # method receives a typed EnrichedPaymentEvent / EnrichedAuthEvent
      # (both implementing IndexedRecord).
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      # group-id is set per-listener via @KafkaListener.groupId so the
      # decision orchestrator can coexist with future Kafka consumers in
      # the same process (e.g. an audit-replay listener).
      auto-offset-reset: earliest
      properties:
        # Each enriched event triggers a slow deliberation (the LLM judge can
        # take tens of seconds — local CPU Ollama runs 60-90s). Process at most
        # a handful of records per poll and allow a long poll interval so a
        # slow deliberation does NOT blow max.poll.interval.ms, which would
        # otherwise make the consumer LeaveGroup and churn the group through
        # repeated rebalances.
        max.poll.interval.ms: 600000
        max.poll.records: 5
    # Streams configuration. application-id is set programmatically (per domain) in
    # KafkaStreamsConfig — don't duplicate it here.
    streams:
      state-dir: ${KAFKA_STREAMS_STATE_DIR:./target/kafka-streams-state}
      replication-factor: 1
      properties:
        commit.interval.ms: 1000
        # Run the topology with at-least-once semantics for the demo; exactly-once-v2 is a
        # future hardening pass once we have multi-broker compose infra.
        processing.guarantee: at_least_once

  # ===== Postgres for the decisions audit table =====
  datasource:
    url: ${ORCHESTRATOR_DB_URL:jdbc:postgresql://localhost:5432/conclave}
    username: ${ORCHESTRATOR_DB_USER:conclave}
    password: ${ORCHESTRATOR_DB_PASSWORD:conclave}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

conclave:
  ingest:
    raw-topic-partitions: 3
    replication-factor: 1
  orchestrator:
    # Deliberation service gRPC target.
    deliberation-target: ${DELIBERATION_TARGET:localhost:9093}
    # Per-call deadline for the deliberation (judge) gRPC call. The LLM judge can
    # take far longer than the original 1500ms p99 target — local CPU Ollama runs
    # 60-90s, and even cloud models routinely exceed 1.5s. A too-short deadline
    # cancelled every call (DEADLINE_EXCEEDED) so zero decisions were persisted.
    # Default 30s; override with DELIBERATION_DEADLINE_MS (scripts/up.sh sets a
    # generous 180s in local Ollama mode).
    deliberation-deadline-ms: ${DELIBERATION_DEADLINE_MS:30000}
    # Stable group id; one logical orchestrator per deployment.
    kafka-consumer-group-id: ${ORCHESTRATOR_CONSUMER_GROUP_ID:conclave-orchestrator}
    # Mirror the raw-topic partition count so downstream consumers see the
    # same shape; 3 for the demo, increase for multi-broker deployments.
    decisions-topic-partitions: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
