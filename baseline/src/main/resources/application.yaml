# Baseline Service configuration.

spring:
  application:
    name: conclave-baseline
  datasource:
    url: ${BASELINE_DB_URL:jdbc:postgresql://localhost:5432/conclave}
    username: ${BASELINE_DB_USER:conclave}
    password: ${BASELINE_DB_PASSWORD:conclave}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  # Stage 1: consume events.{domain}.enriched and roll each entity's baseline.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:mock://conclave-default}
      specific.avro.reader: false
    consumer:
      group-id: ${BASELINE_INGEST_GROUP_ID:conclave-baseline-ingest}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
  # gRPC server. spring-grpc binds spring.grpc.server.* (default port 9090);
  # the bare "grpc.server.port" key used previously was never read by the starter.
  grpc:
    server:
      port: ${BASELINE_GRPC_PORT:9091}

server:
  port: ${BASELINE_REST_PORT:8081}

conclave:
  baseline:
    # EMA decay factor. New event weight = (1 - decay); existing baseline weight = decay.
    # 0.9 means the past dominates; 0.5 means new and old are 50/50; 0.0 means use the
    # latest event verbatim (no rolling). Tuned empirically against synthetic streams.
    #
    # Effective memory ≈ 1 / (1 - decay) events: 0.85 ≈ 7 events, 0.95 ≈ 20, 0.98 ≈ 50.
    # Pick it to match the entity's event cadence over the window you want the baseline
    # to "remember" (e.g. for ~1 event/day and a ~3-week memory, use ~0.95). Scoring
    # (ScoreEvent) is read-only and never folds the scored event back in, so the
    # baseline is not polluted by the very events it is judging.
    #
    # The update applies a count-aware warmup — effDecay = min(decay, 1 - 1/n) — so a
    # new entity's first ~1/(1-decay) events form an unbiased running mean before the
    # EMA takes over. Without it a high decay would leave the profile stuck near the
    # entity's very first event, making early ScoreEvent results untrustworthy.
    ema-decay: 0.85
    # Embedding dimension. Must match the langchain4j model (MiniLM-L6-v2 = 384).
    embedding-dim: 384
    # Anomaly score ScoreEvent returns for an entity with no baseline yet (no history to
    # compare against). Neutral-ish prior; the judge treats it as mild risk.
    cold-start-score: 0.5
    # Cosine DISTANCE (1 - cosine similarity) at which ScoreEvent's anomaly score
    # saturates to 1.0. 0.5 ⇒ an event ≥ 0.5 away in cosine distance is fully anomalous.
    score-max-distance: 0.5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
