# Graph Reasoner Service configuration.

spring:
  application:
    name: conclave-graph
  # Stage 1: consume events.{domain}.enriched and populate Neo4j so the templates
  # have a graph to query. Values come as generic Avro records (read by field name).
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:mock://conclave-default}
      specific.avro.reader: false
    consumer:
      group-id: ${GRAPH_INGEST_GROUP_ID:conclave-graph-ingest}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
  # gRPC server. spring-grpc binds spring.grpc.server.* (default port 9090);
  # the bare "grpc.server.port" key used previously was never read by the starter.
  grpc:
    server:
      port: ${GRAPH_GRPC_PORT:9092}

server:
  port: ${GRAPH_REST_PORT:8082}

conclave:
  graph:
    neo4j:
      uri:      ${NEO4J_URI:bolt://localhost:7687}
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:conclave-graph}
    # Max path length the templates are allowed to use. Hardcoded in the queries
    # too, but exposing here makes the depth-bounded property auditable.
    max-path-depth: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
